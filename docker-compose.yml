version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: crewai-postgres
    environment:
      POSTGRES_USER: crewai
      POSTGRES_PASSWORD: crewai_password
      POSTGRES_DB: crewai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - crewai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crewai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: crewai-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - crewai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  boss:
    build:
      context: .
      dockerfile: ./boss/Dockerfile
    container_name: crewai-boss
    environment:
      - DB_DNS=host=postgres user=crewai password=crewai_password dbname=crewai port=5432
      - AZURE_API_KEY=${AZURE_API_KEY:-}
      - AGENTS_SERVICE_HOST=agents:50053
      - MANAGER_SERVICE_HOST=manager:50052
      - MERGER_SERVICE_HOST=merger:50054
      - REDIS_URL=redis://redis:6379/0
      - REDIS_ENABLED=true
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
      agents:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - crewai-network
    restart: unless-stopped

  manager:
    build:
      context: .
      dockerfile: ./manager/Dockerfile
    container_name: crewai-manager
    environment:
      - DB_DNS=host=postgres user=crewai password=crewai_password dbname=crewai port=5432
      - AGENTS_SERVICE_HOST=agents:50053
      - WORKER_SERVICE_HOST=worker:50053
    ports:
      - "50052:50052"
    depends_on:
      postgres:
        condition: service_healthy
      boss:
        condition: service_started
      agents:
        condition: service_started
    networks:
      - crewai-network
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: ./worker/Dockerfile
    container_name: crewai-worker
    environment:
      - DB_DNS=host=postgres user=crewai password=crewai_password dbname=crewai port=5432
      - AGENTS_SERVICE_HOST=agents:50053
      - REDIS_URL=redis://redis:6379/0
      - REDIS_ENABLED=true
      - WORKER_MODE=multypass
    depends_on:
      postgres:
        condition: service_healthy
      manager:
        condition: service_started
      agents:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - crewai-network
    restart: unless-stopped

  agents:
    build:
      context: .
      dockerfile: ./agents/Dockerfile
    container_name: crewai-agents
    environment:
      - AGENTS_PORT=50053
      - CLIPROXY_API_URL=http://host.docker.internal:8317/v1
    ports:
      - "50053:50053"
    networks:
      - crewai-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  merger:
    build:
      context: .
      dockerfile: ./merger/Dockerfile
    container_name: crewai-merger
    environment:
      - MERGER_PORT=50054
    ports:
      - "50054:50054"
    depends_on:
      boss:
        condition: service_started
    networks:
      - crewai-network
    restart: unless-stopped

  apigateway:
    build:
      context: .
      dockerfile: ./apigateway/Dockerfile
    container_name: crewai-apigateway
    environment:
      - BOSS_SERVICE_HOST=boss:50051
      - AZURE_API_KEY=${AZURE_API_KEY:-}
      - REDIS_URL=redis://redis:6379/0
      - REDIS_ENABLED=true
      - AUTH_SERVICE_HOST=auth:3112
    ports:
      - "3111:3111"
    depends_on:
      boss:
        condition: service_started
      agents:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - crewai-network
    restart: unless-stopped

  auth:
    build:
      context: .
      dockerfile: ./auth/Dockerfile
    container_name: crewai-auth
    environment:
      - DB_DNS=host=postgres user=crewai password=crewai_password dbname=crewai port=5432
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-change-refresh-in-production}
      - AUTH_PORT=3112
    ports:
      - "3112:3112"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - crewai-network
    restart: unless-stopped

networks:
  crewai-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
