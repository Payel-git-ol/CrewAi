version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: crewai-postgres
    environment:
      POSTGRES_USER: crewai
      POSTGRES_PASSWORD: crewai_password
      POSTGRES_DB: crewai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - crewai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crewai"]
      interval: 10s
      timeout: 5s
      retries: 5

  boss:
    build:
      context: .
      dockerfile: ./boss/Dockerfile
    container_name: crewai-boss
    environment:
      - DB_DNS=host=postgres user=crewai password=crewai_password dbname=crewai port=5432
      - AZURE_API_KEY=${AZURE_API_KEY:-}
      - AGENTS_SERVICE_HOST=agents:50053
      - MANAGER_SERVICE_HOST=manager:50052
      - MERGER_SERVICE_HOST=merger:50054
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
      agents:
        condition: service_started
    networks:
      - crewai-network
    restart: unless-stopped

  manager:
    build:
      context: .
      dockerfile: ./manager/Dockerfile
    container_name: crewai-manager
    environment:
      - DB_DNS=host=postgres user=crewai password=crewai_password dbname=crewai port=5432
      - AGENTS_SERVICE_HOST=agents:50053
      - WORKER_SERVICE_HOST=worker:50053
    ports:
      - "50052:50052"
    depends_on:
      postgres:
        condition: service_healthy
      boss:
        condition: service_started
      agents:
        condition: service_started
    networks:
      - crewai-network
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: ./worker/Dockerfile
    container_name: crewai-worker
    environment:
      - DB_DNS=host=postgres user=crewai password=crewai_password dbname=crewai port=5432
      - AGENTS_SERVICE_HOST=agents:50053
    depends_on:
      postgres:
        condition: service_healthy
      manager:
        condition: service_started
      agents:
        condition: service_started
    networks:
      - crewai-network
    restart: unless-stopped

  agents:
    build:
      context: ./agents
      dockerfile: Dockerfile
    container_name: crewai-agents
    environment:
      - AGENTS_PORT=50053
    ports:
      - "50053:50053"
    networks:
      - crewai-network
    restart: unless-stopped

  merger:
    build:
      context: .
      dockerfile: ./merger/Dockerfile
    container_name: crewai-merger
    environment:
      - MERGER_PORT=50054
    ports:
      - "50054:50054"
    depends_on:
      boss:
        condition: service_started
    networks:
      - crewai-network
    restart: unless-stopped

  apigateway:
    build:
      context: .
      dockerfile: ./apigateway/Dockerfile
    container_name: crewai-apigateway
    environment:
      - BOSS_SERVICE_HOST=boss:50051
      - AZURE_API_KEY=${AZURE_API_KEY:-}
    ports:
      - "3111:3111"
    depends_on:
      boss:
        condition: service_started
      agents:
        condition: service_started
    networks:
      - crewai-network
    restart: unless-stopped

networks:
  crewai-network:
    driver: bridge

volumes:
  postgres_data:
