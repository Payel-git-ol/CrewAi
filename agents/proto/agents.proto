syntax = "proto3";

package agentspb;

option go_package = "agents/pb;pb";

// Agent service for AI content generation
service AgentService {
  rpc Generate(GenerateRequest) returns (GenerateResponse) {}
  rpc GenerateStream(GenerateRequest) returns (stream GenerateStreamChunk) {}
}

// GenerateRequest is the request to generate content
message GenerateRequest {
  string provider = 1;           // claude, gemini, openai, deepseek, grok
  string model = 2;              // specific model name
  string prompt = 3;             // the prompt
  map<string, string> tokens = 4; // auth tokens
  int32 max_tokens = 5;          // response max tokens
  float temperature = 6;         // creativity parameter
}

// GenerateResponse is the response from generation
message GenerateResponse {
  string provider = 1;
  string model = 2;
  string content = 3;
  int32 tokens_used = 4;
  string error = 5;
  string error_code = 6;
}

// GenerateStreamChunk is a streaming chunk of generated content
message GenerateStreamChunk {
  string content = 1;      // partial content
  bool done = 2;           // true when generation is complete
  string error = 3;        // error message if any
  int32 tokens_used = 4;   // tokens used so far
}
