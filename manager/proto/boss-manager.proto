syntax = "proto3";

package manager;

option go_package = "manager/internal/fetcher/grpc/managerpb";

import "boss.proto";

// Запрос от boss к manager
message AssignManagersRequest {
  string task_id = 1;
  string technical_description = 2;
  repeated string tech_stack = 3;
  repeated ManagerRole manager_roles = 4;  // От босса
}

// Ответ manager
message AssignManagersResponse {
  string task_id = 1;
  string status = 2;  // success, error
  repeated ManagerInfo managers = 3;
  string error_message = 4;
}

message ManagerInfo {
  string id = 1;
  string role = 2;  // "frontend", "backend", "testing"
  string status = 3;  // active, completed, error
  repeated WorkerRole worker_roles = 4;  // Менеджер решает сколько воркеров нужно
}

message WorkerRole {
  string role = 1;  // "react-dev", "go-dev", "qa-automation"
  string description = 2;
}

// Запрос на получение задачи для менеджера
message GetTaskRequest {
  string manager_id = 1;
}

message GetTaskResponse {
  string task_id = 1;
  string technical_description = 2;
  repeated string tech_stack = 3;
  string manager_role = 4;
}

service ManagerService {
  rpc AssignManagers(AssignManagersRequest) returns (AssignManagersResponse);
  rpc GetTask(GetTaskRequest) returns (GetTaskResponse);
}
