import:
  - file: agents.yaml
    appeal: agents
  - file: teams.yaml
    appeal: teams
  - file: communication.yaml
    appeal: communication

main-file:
  files:
    - "cmd/app/main.go"

project:
  internal:
    agents:
      - "manager.go"
      - "worker.go"
      - "coordinator.go"
    teams:
      - "team.go"
      - "squad.go"
    communication:
      - "message.go"
      - "channel.go"
    core:
      - "orchestrator.go"

services:
  main:
    type: azure.main
    azure.use:
      - Logger()
      - Recovery()

    azure.handlers:
      "/":
        method: get
        result:
          json:
            "status": "crewai is running"
      
      "/api/v1/company/start":
        method: post
        operations: "bind(CompanyConfig)"
        result:
          json:
            "message": "company started"
      
      "/api/v1/company/stop":
        method: post
        result:
          json:
            "message": "company stopped"
      
      "/api/v1/agents":
        method: get
        result:
          json:
            "agents": "list of agents"
      
      "/api/v1/teams":
        method: get
        result:
          json:
            "teams": "list of teams"

    run: "8080"

  orchestrator:
    type: services
    functions:
      StartCompany:
        parameters:
          config: CompanyConfig
        code: 'log.Println("starting company simulation")'
      
      StopCompany:
        parameters:
          companyID: string
        code: 'log.Println("stopping company simulation")'
      
      AddAgent:
        parameters:
          teamID: string
          agent: Agent
        model: Agent
        code: 'log.Println("adding agent to team")'
      
      RemoveAgent:
        parameters:
          agentID: string
        code: 'log.Println("removing agent")'
      
      GetAgent:
        parameters:
          agentID: string
        model: Agent
        code: 'log.Println("getting agent info")'
      
      GetTeam:
        parameters:
          teamID: string
        model: Team
        code: 'log.Println("getting team info")'

  database:
    type: database
    database:
      orm: gorm
      driver: postgres
      dns:
        azure.env: "DATABASE_DNS"
      auto-migrate:
        model:
          - Agent
          - Team
          - Message
          - Task
          - Company
