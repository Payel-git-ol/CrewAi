export:
  project:
    internal:
      agents:
        - "manager.go"
        - "worker.go"
        - "coordinator.go"
        - "role.go"
      teams:
        - "team.go"
        - "squad.go"
      communication:
        - "message.go"
        - "channel.go"
        - "protocol.go"
      core:
        - "orchestrator.go"
        - "simulator.go"

  services:
    agents:
      functions:
        CreateManager:
          parameters:
            name: string
            role: string
            teamID: string
          model: Agent
          code: 'log.Println("creating manager agent")'
        
        CreateWorker:
          parameters:
            name: string
            role: string
            specialty: string
          model: Agent
          code: 'log.Println("creating worker agent")'
        
        CreateCoordinator:
          parameters:
            name: string
            teams: []string
          model: Agent
          code: 'log.Println("creating coordinator agent")'
        
        AssignTask:
          parameters:
            agentID: string
            task: Task
          code: 'log.Println("assigning task to agent")'
        
        GetAgentStatus:
          parameters:
            agentID: string
          model: AgentStatus
          code: 'log.Println("getting agent status")'
        
        UpdateAgentStatus:
          parameters:
            agentID: string
            status: string
          code: 'log.Println("updating agent status")'
        
        GetAgentTasks:
          parameters:
            agentID: string
          model: "[]Task"
          code: 'log.Println("getting agent tasks")'

    teams:
      functions:
        CreateTeam:
          parameters:
            name: string
            lead: Agent
            members: []Agent
          model: Team
          code: 'log.Println("creating team")'
        
        AddMember:
          parameters:
            teamID: string
            agent: Agent
          code: 'log.Println("adding team member")'
        
        RemoveMember:
          parameters:
            teamID: string
            agentID: string
          code: 'log.Println("removing team member")'
        
        GetTeamStructure:
          parameters:
            teamID: string
          model: Team
          code: 'log.Println("getting team structure")'
        
        GetTeamMembers:
          parameters:
            teamID: string
          model: "[]Agent"
          code: 'log.Println("getting team members")'
        
        SetTeamLead:
          parameters:
            teamID: string
            agentID: string
          code: 'log.Println("setting team lead")'

    communication:
      functions:
        SendMessage:
          parameters:
            from: string
            to: string
            content: string
            channelType: string
          model: Message
          code: 'log.Println("sending message")'
        
        BroadcastToTeam:
          parameters:
            teamID: string
            from: string
            content: string
          code: 'log.Println("broadcasting to team")'
        
        GetMessages:
          parameters:
            channelID: string
            limit: int
          model: "[]Message"
          code: 'log.Println("getting messages")'
        
        CreateChannel:
          parameters:
            name: string
            members: []string
          model: Channel
          code: 'log.Println("creating channel")'
        
        JoinChannel:
          parameters:
            channelID: string
            agentID: string
          code: 'log.Println("joining channel")'

    core:
      functions:
        InitializeOrchestrator:
          parameters:
            config: CompanyConfig
          code: 'log.Println("initializing orchestrator")'
        
        StartSimulation:
          parameters:
            speed: int
          code: 'log.Println("starting simulation")'
        
        StopSimulation:
          code: 'log.Println("stopping simulation")'
        
        GetSimulationStatus:
          model: SimulationStatus
          code: 'log.Println("getting simulation status")'
