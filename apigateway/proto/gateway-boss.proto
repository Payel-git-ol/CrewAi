syntax = "proto3";

package boss;

option go_package = "./internal/fetcher/grpc/boss";

message TaskRequest {
  string username = 1;
  string taskname = 2;
  string title = 3;
  string description = 4;
  repeated string tokens = 5;
  map<string, string> metadata = 6;
}

message TaskResponse {
  string taskname = 1;
  string title = 2;
  string description = 3;
  bytes solution = 4;
  
  string status = 5;
  string error_message = 6;
  int64 archive_size = 7;
  string archive_format = 8;
}

service TaskService {
  rpc Task(TaskRequest) returns (TaskResponse);
}