syntax = "proto3";

package boss;

option go_package = "crewai/internal/fetcher/grpc/boss/bosspb";

// Task update message for streaming
message TaskUpdate {
  string task_id = 1;
  string message = 2;
  int32 progress = 3;
  string status = 4;
  int64 timestamp = 5;
  map<string, string> data = 6;
}

// Request from apigateway to boss
message CreateTaskRequest {
  string user_id = 1;
  string username = 2;
  string title = 3;
  string description = 4;
  repeated string tokens = 5;
  map<string, string> meta = 6;  // model, modelUrl
}

// Manager role
message ManagerRole {
  string role = 1;
  string description = 2;
  int32 priority = 3;
}

// Boss decision with ZIP solution
message BossDecision {
  string task_id = 1;
  string status = 2;  // done, error

  int32 managers_count = 3;
  repeated ManagerRole manager_roles = 4;

  string technical_description = 5;
  repeated string tech_stack = 6;
  string architecture_notes = 7;
  
  bytes solution = 8;  // ZIP archive
  string error_message = 9;
}

// Task status request
message TaskStatusRequest {
  string task_id = 1;
}

message TaskStatusResponse {
  string task_id = 1;
  string status = 2;
  string progress = 3;
}

service BossService {
  // Streaming version - отправляет обновления по мере выполнения
  rpc CreateTaskStream(CreateTaskRequest) returns (stream TaskUpdate);
  
  // Legacy unary version (для совместимости)
  rpc CreateTask(CreateTaskRequest) returns (BossDecision);
  rpc GetTaskStatus(TaskStatusRequest) returns (TaskStatusResponse);
}
