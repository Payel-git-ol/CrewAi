        ReassignMember:
          parameters:
            agentID: string
            fromTeamID: string
            toTeamID: string
          code: 'log.Println("reassigning member")'
        
        GetTeamHierarchy:
          parameters:
            teamID: string
          model: "[]Team"
          code: 'log.Println("getting team hierarchy")'
        
        GetTeamByAgent:
          parameters:
            agentID: string
          model: Team
          code: 'log.Println("getting team by agent")'
        
        GetAllTeams:
          model: "[]Team"
          code: 'log.Println("getting all teams")'
        
        DeleteTeam:
          parameters:
            teamID: string
          code: 'log.Println("deleting team")'
        
        # === Кросс-функциональные команды ===
        CreateSquad:
          parameters:
            name: string
            members: []Agent
            goal: string
          model: Squad
          code: 'log.Println("creating cross-functional squad")'
        
        CreateTaskForce:
          parameters:
            name: string
            lead: Agent
            duration: string
          model: Team
          code: 'log.Println("creating task force")'
        
        # === Управление ролями в команде ===
        PromoteToLead:
          parameters:
            teamID: string
