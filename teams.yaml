export:
  services:
    teams:
      functions:
        # === Создание команд по типам ===
        CreateDevelopmentTeam:
          parameters:
            name: string
            lead: Agent
          model: Team
          code: 'log.Println("creating development team")'
        
        CreateDesignTeam:
          parameters:
            name: string
            lead: Agent
          model: Team
          code: 'log.Println("creating design team")'
        
        CreateQATeam:
          parameters:
            name: string
            lead: Agent
          model: Team
          code: 'log.Println("creating QA team")'
        
        CreateDevOpsTeam:
          parameters:
            name: string
            lead: Agent
          model: Team
          code: 'log.Println("creating DevOps team")'
        
        CreateAnalyticsTeam:
          parameters:
            name: string
            lead: Agent
          model: Team
          code: 'log.Println("creating analytics team")'
        
        CreateProductTeam:
          parameters:
            name: string
            lead: Agent
          model: Team
          code: 'log.Println("creating product team")'
        
        CreateMarketingTeam:
          parameters:
            name: string
            lead: Agent
          model: Team
          code: 'log.Println("creating marketing team")'
        
        CreateSalesTeam:
          parameters:
            name: string
            lead: Agent
          model: Team
          code: 'log.Println("creating sales team")'
        
        CreateSupportTeam:
          parameters:
            name: string
            lead: Agent
          model: Team
          code: 'log.Println("creating support team")'
        
        # === Управление командами ===
        MergeTeams:
          parameters:
            team1ID: string
            team2ID: string
          model: Team
          code: 'log.Println("merging teams")'
        
        SplitTeam:
          parameters:
            teamID: string
            newTeamName: string
