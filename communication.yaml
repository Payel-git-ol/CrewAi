export:
  services:
    communication:
      functions:
        # === Прямые сообщения ===
        SendDirectMessage:
          parameters:
            from: string
            to: string
            content: string
          model: Message
          code: 'log.Println("sending direct message")'
        
        SendReply:
          parameters:
            from: string
            replyTo: string
            content: string
          model: Message
          code: 'log.Println("sending reply")'
        
        ForwardMessage:
          parameters:
            from: string
            messageID: string
            to: string
          model: Message
          code: 'log.Println("forwarding message")'
        
        # === Командные сообщения ===
        SendTeamMessage:
          parameters:
            from: string
            teamID: string
            content: string
          model: Message
          code: 'log.Println("sending team message")'
        
        SendBroadcast:
          parameters:
            from: string
            content: string
            targetAll: bool
          code: 'log.Println("sending broadcast")'
        
        SendAnnouncement:
          parameters:
            from: string
            content: string
            priority: string
          model: Message
          code: 'log.Println("sending announcement")'
        
        # === Каналы связи ===
        CreateChannel:
          parameters:
            name: string
            channelType: string
            members: []string
          model: Channel
          code: 'log.Println("creating channel")'
        
        CreatePublicChannel:
          parameters:
            name: string
          model: Channel
          code: 'log.Println("creating public channel")'
        
        CreatePrivateChannel:
          parameters:
            name: string
            members: []string
          model: Channel
          code: 'log.Println("creating private channel")'
        
        CreateTeamChannel:
          parameters:
            name: string
            teamID: string
          model: Channel
          code: 'log.Println("creating team channel")'
        
        JoinChannel:
          parameters:
            channelID: string
            agentID: string
          code: 'log.Println("joining channel")'
        
        LeaveChannel:
          parameters:
            channelID: string
            agentID: string
          code: 'log.Println("leaving channel")'
        
        KickFromChannel:
          parameters:
            channelID: string
            agentID: string
            by: string
          code: 'log.Println("kicking from channel")'
        
        DeleteChannel:
          parameters:
            channelID: string
          code: 'log.Println("deleting channel")'
        
        # === Встречи и созвоны ===
        StartMeeting:
          parameters:
            organizer: string
            participants: []string
            topic: string
          model: Meeting
          code: 'log.Println("starting meeting")'
        
        ScheduleMeeting:
          parameters:
            organizer: string
            participants: []string
            topic: string
            scheduledTime: string
          model: Meeting
          code: 'log.Println("scheduling meeting")'
        
        EndMeeting:
          parameters:
            meetingID: string
          code: 'log.Println("ending meeting")'
        
        JoinMeeting:
          parameters:
            meetingID: string
            agentID: string
          code: 'log.Println("joining meeting")'
        
        LeaveMeeting:
          parameters:
            meetingID: string
            agentID: string
          code: 'log.Println("leaving meeting")'
        
        # === Запросы информации ===
        RequestInfo:
          parameters:
            from: string
            to: string
            infoType: string
            details: string
          model: Message
          code: 'log.Println("requesting info")'
        
        RequestReport:
          parameters:
            from: string
            to: string
            reportType: string
            period: string
          model: Message
          code: 'log.Println("requesting report")'
        
        RequestStatus:
          parameters:
            from: string
            to: string
          model: Message
          code: 'log.Println("requesting status")'
        
        # === Отчёты и прогресс ===
        ReportProgress:
          parameters:
            agentID: string
            taskID: string
            progress: int
          code: 'log.Println("reporting progress")'
        
        ReportCompletion:
          parameters:
            agentID: string
            taskID: string
            result: string
          code: 'log.Println("reporting completion")'
        
        ReportBlocker:
          parameters:
            agentID: string
            taskID: string
            blocker: string
          code: 'log.Println("reporting blocker")'
        
        SendDailyReport:
          parameters:
            agentID: string
            teamID: string
          code: 'log.Println("sending daily report")'
        
        SendWeeklyReport:
          parameters:
            agentID: string
            teamID: string
          code: 'log.Println("sending weekly report")'
        
        # === Уведомления ===
        NotifyAgent:
          parameters:
            to: string
            notificationType: string
            content: string
          code: 'log.Println("notifying agent")'
        
        NotifyTeam:
          parameters:
            teamID: string
            notificationType: string
            content: string
          code: 'log.Println("notifying team")'
        
        SubscribeToNotifications:
          parameters:
            agentID: string
            notificationTypes: []string
          code: 'log.Println("subscribing to notifications")'
        
        UnsubscribeFromNotifications:
          parameters:
            agentID: string
          code: 'log.Println("unsubscribing from notifications")'
        
        # === История и поиск ===
        GetMessageHistory:
          parameters:
            agentID: string
            limit: int
          model: "[]Message"
          code: 'log.Println("getting message history")'
        
        GetChannelHistory:
          parameters:
            channelID: string
            limit: int
          model: "[]Message"
          code: 'log.Println("getting channel history")'
        
        SearchMessages:
          parameters:
            query: string
            channelID: string
            limit: int
          model: "[]Message"
          code: 'log.Println("searching messages")'
