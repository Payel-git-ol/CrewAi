export:
  project:
    pkg:
      models:
        - "agent.go"
        - "team.go"
        - "message.go"
        - "task.go"
        - "company.go"
      types:
        - "roles.go"
        - "status.go"
        - "config.go"

  services:
    models:
      models:
        - path: "pkg/models/agent.go"
          type: model
          name: "Agent"
          fields:
            - name: ID
              type: string
            - name: Name
              type: string
            - name: Role
              type: string
            - name: RoleType
              type: string
            - name: TeamID
              type: string
            - name: Status
              type: string
            - name: Skills
              type: "[]string"
            - name: Personality
              type: "map[string]interface{}"
            - name: CreatedAt
              type: time.Time
            - name: UpdatedAt
              type: time.Time

        - path: "pkg/models/team.go"
          type: model
          name: "Team"
          fields:
            - name: ID
              type: string
            - name: Name
              type: string
            - name: LeadID
              type: string
            - name: Members
              type: "[]Agent"
            - name: ParentTeamID
              type: string
            - name: CreatedAt
              type: time.Time
            - name: UpdatedAt
              type: time.Time

        - path: "pkg/models/message.go"
          type: model
          name: "Message"
          fields:
            - name: ID
              type: string
            - name: From
              type: string
            - name: To
              type: string
            - name: Content
              type: string
            - name: ChannelType
              type: string
            - name: Timestamp
              type: time.Time
            - name: Metadata
              type: "map[string]interface{}"
            - name: Read
              type: bool

        - path: "pkg/models/task.go"
          type: model
          name: "Task"
          fields:
            - name: ID
              type: string
            - name: Title
              type: string
            - name: Description
              type: string
            - name: AssigneeID
              type: string
            - name: Status
              type: string
            - name: Priority
              type: int
            - name: Progress
              type: int
            - name: CreatedAt
              type: time.Time
            - name: CompletedAt
              type: time.Time

        - path: "pkg/models/company.go"
          type: model
          name: "Company"
          fields:
            - name: ID
              type: string
            - name: Name
              type: string
            - name: Teams
              type: "[]Team"
            - name: Status
              type: string
            - name: CreatedAt
              type: time.Time
            - name: UpdatedAt
              type: time.Time

        - path: "pkg/models/channel.go"
          type: model
          name: "Channel"
          fields:
            - name: ID
              type: string
            - name: Name
              type: string
            - name: Type
              type: string
            - name: Members
              type: "[]string"
            - name: CreatedAt
              type: time.Time

        - path: "pkg/types/roles.go"
          type: model
          name: "RoleType"
          fields:
            - name: Name
              type: string
            - name: Category
              type: string
            - name: Permissions
              type: "[]string"
            - name: DefaultSkills
              type: "[]string"
            - name: Description
              type: string

        - path: "pkg/types/status.go"
          type: model
          name: "AgentStatus"
          fields:
            - name: AgentID
              type: string
            - name: Status
              type: string
            - name: CurrentTask
              type: string
            - name: LastActivity
              type: time.Time
            - name: Message
              type: string

        - path: "pkg/types/status.go"
          type: model
          name: "SimulationStatus"
          fields:
            - name: Running
              type: bool
            - name: AgentCount
              type: int
            - name: TeamCount
              type: int
            - name: MessageCount
              type: int
            - name: TaskCount
              type: int
            - name: Uptime
              type: string

        - path: "pkg/types/config.go"
          type: model
          name: "CompanyConfig"
          fields:
            - name: Name
              type: string
            - name: TeamsConfig
              type: "[]TeamConfig"
            - name: CommunicationProtocol
              type: string
            - name: SimulationSpeed
              type: int
            - name: AutoAssignTasks
              type: bool

        - path: "pkg/types/config.go"
          type: model
          name: "TeamConfig"
          fields:
            - name: Name
              type: string
            - name: LeadRole
              type: string
            - name: WorkerRoles
              type: "[]string"
            - name: MemberCount
              type: int
