syntax = "proto3";

package worker;

option go_package = "worker/internal/fetcher/grpc/workerpb";

// Task update message for streaming
message TaskUpdate {
  string task_id = 1;
  string message = 2;
  int32 progress = 3;
  string status = 4;
  int64 timestamp = 5;
  map<string, string> data = 6;
}

message WorkerRole {
  string role = 1;
  string description = 2;
}

// WorkerResult — результат работы воркера
message WorkerResult {
  string worker_id = 1;
  string role = 2;
  string task_md = 3;
  string solution_md = 4;
  map<string, string> files = 5;   // path -> content
  bool success = 6;
  string feedback = 7;
  bool approved = 8;
}

message AssignWorkersRequest {
  string task_id = 1;
  string manager_id = 2;
  string manager_role = 3;
  repeated WorkerRole worker_roles = 4;
  string task_md = 5;
  map<string, string> metadata = 6;
  repeated WorkerResult other_workers_results = 7; // результаты других воркеров
}

message AssignWorkersResponse {
  string task_id = 1;
  string status = 2;
  bytes solution = 3;  // ZIP архив с кодом
  repeated WorkerResult worker_results = 4; // результаты всех воркеров
}

// ReviewRequest — запрос на исправление от менеджера
message ReviewRequest {
  string task_id = 1;
  string manager_id = 2;
  string worker_id = 3;
  string worker_role = 4;
  string feedback = 5;          // замечания менеджера
  string original_solution_md = 6;
  map<string, string> original_files = 7;
  map<string, string> metadata = 8;
}

message ReviewResponse {
  string task_id = 1;
  string worker_id = 2;
  string status = 3;            // fixed, failed
  string solution_md = 4;
  map<string, string> files = 5;
  string feedback = 6;
}

service WorkerService {
  // Streaming version - отправляет обновления по мере выполнения
  rpc AssignWorkersAndWaitStream(AssignWorkersRequest) returns (stream TaskUpdate);

  // Основной метод — назначить воркеров и ждать результат
  rpc AssignWorkersAndWait(AssignWorkersRequest) returns (AssignWorkersResponse);

  // Review — отправить воркеру замечания для исправления
  rpc ReviewWorker(ReviewRequest) returns (ReviewResponse);
}
